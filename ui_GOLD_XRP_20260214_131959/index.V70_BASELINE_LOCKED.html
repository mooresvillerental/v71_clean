<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>V70 Host — Signal Monitor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0f1115;
      color: #eaeaea;
    }

    .card {
      max-width: 720px;
      margin: auto;
      background: #161a22;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.05);
    }

    h1 {
      margin-top: 0;
      font-size: 22px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .row:last-child {
      border-bottom: none;
    }

    .label {
      opacity: 0.7;
    }

    .value {
      font-weight: 600;
    }

    .status {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .online {
      background: #1e7f43;
      color: #d9ffe9;
    }

    .offline {
      background: #7f1e1e;
      color: #ffd9d9;
    }

    .buy {
      color: #2eea8f;
      font-size: 28px;
      font-weight: 800;
    }

    .sell {
      color: #ff6b6b;
      font-size: 28px;
      font-weight: 800;
    }

    .hold {
      color: #f2c94c;
      font-size: 28px;
      font-weight: 800;
    }

    button {
      margin-top: 16px;
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #2a6df4;
      color: white;
      font-size: 16px;
      font-weight: 700;
    }

    .meta {
      margin-top: 12px;
      font-size: 12px;
      opacity: 0.7;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>V70 Host — Signal Monitor</h1>

    <div class="row">
      <div class="label">Server</div>
      <div id="serverStatus" class="status offline">OFFLINE</div>
    </div>

    <div class="row">
      <div class="label">Platform</div>
      <div id="platform" class="value">—</div>
    </div>

    <div class="row">
      <div class="label">Primary Symbol</div>
      <div id="primarySymbol" class="value">—</div>
    </div>

    <div class="row">
      <div class="label">Paper Enforced</div>
      <div id="paperMode" class="value">—</div>
    </div>

    <hr style="margin:16px 0; border:0; border-top:1px solid rgba(255,255,255,0.08);" />

    <div id="action" class="hold">—</div>

    <div class="row">
      <div class="label">Symbol</div>
      <div id="symbol" class="value">—</div>
    </div>

    <div class="row">
      <div class="label">Price</div>
      <div id="price" class="value">—</div>
    </div>

    <div class="row">
      <div class="label">Reason</div>
      <div id="reason" class="value">—</div>
    </div>

    <div class="row">
      <div class="label">Timestamp</div>
      <div id="ts" class="value">—</div>
    </div>

    <button onclick="refresh()">Refresh now</button>

    <div id="meta" class="meta">—</div>
  </div>

<script>
const POLL_MS = 5000;

function el(id) {
  return document.getElementById(id);
}

function setAction(text) {
  const a = el("action");
  a.textContent = text || "—";
  a.className = text === "BUY" ? "buy" :
                text === "SELL" ? "sell" : "hold";
}

async function refresh() {
  const now = new Date().toLocaleString();

  try {
    const status = await fetch("/api/status").then(r => r.json());
    el("serverStatus").textContent = "ONLINE";
    el("serverStatus").className = "status online";
    el("platform").textContent = status.platform || "—";
    el("primarySymbol").textContent = status.primary_symbol || "—";
    el("paperMode").textContent = String(status.paper_enforced);
  } catch {
    el("serverStatus").textContent = "OFFLINE";
    el("serverStatus").className = "status offline";
  }

  try {
    const sig = await fetch("/api/signal/latest").then(r => r.json());

    if (sig.status === "SIGNAL") {
      setAction(sig.action);
      el("symbol").textContent = sig.symbol || "—";
      el("price").textContent = sig.price ?? "—";
      el("reason").textContent = sig.reason || "—";
      el("ts").textContent = sig.ts || "—";
    } else {
      setAction("HOLD");
    }

    el("meta").textContent = `Last update: ${now} (Auto-refresh: ON, ${POLL_MS/1000}s)`;
  } catch {
    el("meta").textContent = `Could not reach API (${now})`;
  }
}

refresh();
setInterval(refresh, POLL_MS);
</script>
</body>
</html>
