<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>V70 Wrapper — Signal Monitor</title>

  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0f1115;
      color: #eaeaea;
      padding: 20px;
    }

    .card {
      max-width: 720px;
      margin: auto;
      background: #161a22;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }

    h2 {
      margin-top: 0;
      text-align: center;
    }

    .status {
      font-size: 32px;
      font-weight: 800;
      text-align: center;
      margin: 12px 0;
    }

    .BUY  { color: #00ff9c; }
    .SELL { color: #ff5c5c; }
    .HOLD { color: #ffc857; }

    .row {
      display: flex;
      justify-content: space-between;
      margin: 6px 0;
      font-size: 16px;
    }

    .label { color: #9aa4b2; }
    .value { font-weight: 600; }

    .muted {
      text-align: center;
      margin-top: 10px;
      font-size: 13px;
      color: #7a8494;
    }

    button {
      margin-top: 14px;
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      background: #2a3246;
      color: #fff;
      cursor: pointer;
    }

    button:hover {
      background: #3a4563;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>V70 Wrapper — Live Signal</h2>

    <div id="action" class="status HOLD">LOADING</div>

    <div class="row"><span class="label">Symbol</span><span class="value" id="symbol">—</span></div>
    <div class="row"><span class="label">Price</span><span class="value" id="price">—</span></div>
    <div class="row"><span class="label">Reason</span><span class="value" id="reason">—</span></div>
    <div class="row"><span class="label">Timestamp</span><span class="value" id="ts">—</span></div>

    <button onclick="refresh()">Refresh</button>

    <div class="muted" id="meta">Polling /signal</div>
  </div>

<script>
const API = "http://127.0.0.1:8080/signal";
const POLL_MS = 5000;

async function refresh() {
  try {
    const res = await fetch(API, { cache: "no-store" });
    const data = await res.json();

    if (!data.ok || !data.signal) {
      throw new Error("Invalid response");
    }

    const s = data.signal;

    const actionEl = document.getElementById("action");
    actionEl.textContent = s.action || "HOLD";
    actionEl.className = "status " + (s.action || "HOLD");

    document.getElementById("symbol").textContent = s.symbol ?? "—";
    document.getElementById("price").textContent  = s.price  ?? "—";
    document.getElementById("reason").textContent = s.reason ?? "—";
    document.getElementById("ts").textContent     = s.ts     ?? "—";

    document.getElementById("meta").textContent =
      "Last update: " + new Date().toLocaleTimeString();

  } catch (e) {
    document.getElementById("action").textContent = "ERROR";
    document.getElementById("action").className = "status HOLD";
    document.getElementById("meta").textContent = "API error";
  }
}

refresh();
setInterval(refresh, POLL_MS);
</script>
</body>
</html>
