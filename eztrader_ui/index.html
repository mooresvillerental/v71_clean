<!DOCTYPE html>
<html>
<head>
  <title>EZTRADER Dashboard</title>
  <style>
    body {
      background:#0f172a;
      color:white;
      font-family:Arial;
      padding:20px;
    }
    .card {
      background:#1e293b;
      padding:20px;
      border-radius:10px;
      margin-bottom:15px;
    }
  </style>
</head>

<body>

<h1>EZTRADER</h1>

<div class="card">
  <h2>Latest Signal</h2>
  <div id="signal"></div>
</div>

<div class="card">
  <h2>Stats</h2>
  <div id="stats"></div>
</div>

<div class="card">
  <h2>Recent Signals</h2>
  <div id="history"></div>
</div>

<script>

async function loadDashboard() {

  const res = await fetch("http://127.0.0.1:8000/dashboard");
  const data = await res.json();

  const signal = data.latest_signal;
  document.getElementById("signal").innerHTML =
    signal.action + " " + signal.symbol +
    " @ $" + signal.price;

  const stats = data.stats;
  document.getElementById("stats").innerHTML =
    "Win Rate: " + stats.win_rate + "%<br>" +
    "Trades: " + stats.total_trades;

  const history = data.recent_signals;

  let html = "";

  history.forEach(s => {
    html += s.action + " " + s.symbol + " $" + s.price + "<br>";
  });

  document.getElementById("history").innerHTML = html;
}

loadDashboard();
setInterval(loadDashboard, 5000);

</script>

</body>
</html>
