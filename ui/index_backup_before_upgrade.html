<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>EZTrader — Signal Monitor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0f1115;
      color: #eaeaea;
    }

    .card {
      max-width: 720px;
      margin: auto;
      background: #161a22;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.05);
    }

    h1 {
      margin-top: 0;
      font-size: 22px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .row:last-child {
      border-bottom: none;
    }

    .label {
      opacity: 0.7;
    }

    .value {
      font-weight: 600;
    }

    .status {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .online {
      background: #1e7f43;
      color: #d9ffe9;
    }

    .offline {
      background: #7f1e1e;
      color: #ffd9d9;
    }

    .buy {
      color: #2eea8f;
      font-size: 28px;
      font-weight: 800;
    }

    .sell {
      color: #ff6b6b;
      font-size: 28px;
      font-weight: 800;
    }

    .hold {
      color: #f2c94c;
      font-size: 28px;
      font-weight: 800;
    }

    button {
      margin-top: 16px;
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #2a6df4;
      color: white;
      font-size: 16px;
      font-weight: 700;
    }

    .meta {
      margin-top: 12px;
      font-size: 12px;
      opacity: 0.7;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>EZTrader — Signal Monitor</h1>

    <div class="row">
      <div class="label">Server</div>
      <div id="serverStatus" class="status offline">OFFLINE</div>
    </div>

    <div class="row">
      <div class="label">Platform</div>
      <div id="platform" class="value">—</div>
    </div>

    <div class="row">
      <div class="label">Primary Symbol</div>
      <div id="primarySymbol" class="value">—</div>
    </div>

    <div class="row">
      <div class="label">Paper Enforced</div>
      <div id="paperMode" class="value">—</div>
    </div>

    <hr style="margin:16px 0; border:0; border-top:1px solid rgba(255,255,255,0.08);" />

    <div id="action" class="hold">—</div>

    <div class="row">
      <div class="label">Symbol</div>
      <div id="symbol" class="value">—</div>
    </div>

    <div class="row">
      <div class="label">Live Price</div>
      <div id="livePrice" class="value">—</div>
    </div>

    <div class="row">
      <div class="label">Signal Price</div>
      <div id="price" class="value">—</div>
    </div>

    <div class="row">
      <div class="label">RSI</div>
      <div id="rsi" class="value">—</div>
    </div>

    <div class="row">
      <div class="label">Confidence</div>
      <div id="confidence" class="value">—</div>
    </div>

    <div class="row">
      <div class="label">Strategy</div>
      <div id="strategy" class="value">—</div>
    </div>

    <div class="row">
      <div class="label">Regime</div>
      <div id="regime" class="value">—</div>
    </div>

    <div class="row">
      <div class="label">Trade Status</div>
      <div id="tradeStatus" class="value">—</div>
    </div>

    <div class="row">
      <div class="label">Signal Age</div>
      <div id="ts" class="value">—</div>
    </div>

    <button onclick="refresh()">Refresh now</button>

    <div id="meta" class="meta">—</div>
  </div>

<script>
const POLL_MS = 5000;

function el(id) {
  return document.getElementById(id);
}

function setAction(text) {
  const a = el("action");
  a.textContent = text || "—";
  a.className = text === "BUY" ? "buy" :
                text === "SELL" ? "sell" : "hold";
}

async function refresh() {
  const now = new Date().toLocaleString();

  try {
    const status = await fetch("/health").then(r => r.json());
    el("serverStatus").textContent = "ONLINE";
    el("serverStatus").className = "status online";
    el("platform").textContent = status.platform || "—";
    el("primarySymbol").textContent = status.primary_symbol || "—";
    el("paperMode").textContent = String(status.paper_enforced);
  } catch {
    el("serverStatus").textContent = "OFFLINE";
    el("serverStatus").className = "status offline";
  }

  try {
    const sig = await fetch("/latest-signal").then(r => r.json());

    const action = sig.action || "NONE";
    setAction(action === "NONE" ? "HOLD" : action);

    el("symbol").textContent = sig.symbol || "—";
    el("price").textContent = sig.price != null ? `$${Number(sig.price).toLocaleString(undefined, {maximumFractionDigits: 0})}` : "—";
    el("livePrice").textContent = sig.live_price != null ? `$${Number(sig.live_price).toLocaleString(undefined, {maximumFractionDigits: 0})}` : "—";
    el("rsi").textContent = sig.rsi != null ? Number(sig.rsi).toFixed(1) : "—";
    el("confidence").textContent = sig.confidence != null ? `${sig.confidence}%` : "—";
    el("strategy").textContent = sig.winning_strategy || sig.strategy || "—";
    el("regime").textContent = sig.regime || "—";

    let tradeStatus = "No trade signal";
    if (action === "BUY" || action === "SELL") {
      if (sig.trade_eligible === false) {
        tradeStatus = `Blocked by Bot: ${sig.eligibility_reason || "Not eligible"}`;
      } else {
        tradeStatus = "Trade available";
      }
    }
    el("tradeStatus").textContent = tradeStatus;

    if (sig.timestamp) {
      const ageSec = Math.max(0, Math.floor(Date.now() / 1000 - Number(sig.timestamp)));
      el("ts").textContent = `${ageSec}s ago`;
    } else {
      el("ts").textContent = "—";
    }

    el("meta").textContent = `Last update: ${now} (Auto-refresh: ON, ${POLL_MS/1000}s)`;
  } catch {
    el("meta").textContent = `Could not reach API (${now})`;
  }
}

refresh();
setInterval(refresh, POLL_MS);
</script>

<script id="EZ_CONFIRM_BIND_V2">
(function(){
  async function postConfirm(action){
    const r = await fetch("/confirm", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: String(action||"").toUpperCase() })
    });
    let j = null;
    try { j = await r.json(); } catch(e) {}
    if(!r.ok){
      const msg = (j && (j.error || j.detail)) ? (j.error || j.detail) : ("HTTP " + r.status);
      throw new Error(msg);
    }
    return j;
  }

  async function getSignal(){
    const r = await fetch("/signal", { cache: "no-store" });
    const j = await r.json();
    return (j && j.signal) ? j.signal : null;
  }

  function findConfirmButton(){
    // Prefer: button containing text CONFIRM
    const buttons = Array.from(document.querySelectorAll("button"));
    return buttons.find(b => (b.textContent||"").trim().toUpperCase() === "CONFIRM") || null;
  }

  function setToast(msg){
    // Minimal, no "loading" pill. If there is already a status element, use it; else alert.
    const el = document.querySelector("[data-ez-status]") || null;
    if(el){ el.textContent = msg; return; }
    // fall back quietly
    console.log(msg);
  }

  window.addEventListener("DOMContentLoaded", () => {
    const btn = findConfirmButton();
    if(!btn){
      console.log("EZ_CONFIRM_BIND_V2: confirm button not found");
      return;
    }

    // Hard-bind click
    btn.addEventListener("click", async (e) => {
      e.preventDefault();
      btn.disabled = true;
      try{
        const sig = await getSignal();
        const action = sig && sig.action ? sig.action : "";
        if(action !== "BUY" && action !== "SELL"){
          throw new Error("No BUY/SELL signal to confirm");
        }
        const out = await postConfirm(action);
        setToast("Confirmed: " + action);
        // optional tiny feedback (no annoying loop)
        try { if(window.termuxTtsSpeak){ window.termuxTtsSpeak("Confirmed " + action); } } catch(e){}
        console.log("CONFIRMED:", out);
      }catch(err){
        setToast("Confirm failed");
        alert("Confirm failed: " + (err && err.message ? err.message : err));
      }finally{
        btn.disabled = false;
      }
    }, { passive: false });
  });
})();
</script>

</body>
</html>
